<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Bookmark Tool</title>
    <link rel="icon" type="image/png" href="/static/robot.png">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>📖 Reading Bookmark Tool</h1>

        <div class="tabs">
            <button class="tab-btn active" id="tab-btn-book" onclick="switchTab('book')">📚 Book Scanner</button>
            <button class="tab-btn" id="tab-btn-article" onclick="switchTab('article')">🔖 Article Bookmark</button>
        </div>

        <!-- ══ Book Scanner Tab ══ -->
        <div id="tab-book">

        <div class="camera-section">
            <input type="file" id="camera-input" accept="image/*" capture="environment">
            <button class="camera-btn" onclick="document.getElementById('camera-input').click()">
                📷 Take Photo
            </button>
            <p style="margin-top: 12px; font-size: 14px; color: #666; text-align: center;">
                💡 Supports English & Chinese text • Multiple pages
            </p>
        </div>

        <div class="images-preview" id="images-preview">
            <div class="images-grid" id="images-grid"></div>
            <button class="add-another-btn" onclick="document.getElementById('camera-input').click()">
                ➕ Add Another Page
            </button>
            <button class="clear-all-btn" onclick="clearAllImages()">
                🗑️ Clear All Images
            </button>
        </div>

        <div class="preview-section" id="preview-section">
            <div class="orientation-section">
                <label>Text Orientation:</label>
                <div class="orientation-buttons">
                    <button class="orientation-btn active" data-orientation="horizontal" onclick="selectOrientation('horizontal')">
                        ➡️ Horizontal<br>
                        <small style="font-weight: normal; opacity: 0.8;">(Left to Right)</small>
                    </button>
                    <button class="orientation-btn" data-orientation="vertical" onclick="selectOrientation('vertical')">
                        ⬇️ Vertical<br>
                        <small style="font-weight: normal; opacity: 0.8;">(Top to Bottom)</small>
                    </button>
                </div>
                <div class="info-box">
                    ℹ️ Select <strong>Vertical</strong> for traditional Chinese books that read from right to left
                </div>
            </div>

            <button class="process-btn" id="process-btn" onclick="processImages()">
                📝 Extract Text from All Images
            </button>
            <div class="progress-bar" id="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="status" id="status"></div>
        </div>

        <div class="text-section" id="text-section">
            <label for="extracted-text">Extracted Text (select and edit as needed):</label>
            <textarea class="extracted-text" id="extracted-text"></textarea>
        </div>

        <div class="book-title-section" id="book-title-section">
            <label for="book-title-select">Book Title:</label>
            <select class="book-title-select" id="book-title-select" onchange="handleBookTitleChange()">
                <option value="">Loading...</option>
            </select>
            <input type="text" class="book-title-input" id="book-title-input" placeholder="Enter book title">
        </div>

        <div class="page-section" id="page-section">
            <label for="page-number">Page Number:</label>
            <input type="number" class="page-input" id="page-number" placeholder="Enter page number" min="1">
        </div>

        <div class="notes-section" id="notes-section">
            <label for="notes-input">Your Notes:</label>
            <textarea class="notes-input" id="notes-input" placeholder="Add your notes here..."></textarea>
            <button class="save-btn" id="save-btn" onclick="saveToNotion()">
                💾 Save to Notion
            </button>
        </div>

        <div class="success-message" id="success-message">
            ✅ Successfully saved to Notion!
        </div>

        <div class="error-message" id="error-message">
            ❌ <span id="error-text"></span>
        </div>

        </div><!-- end #tab-book -->

        <!-- ══ Article Bookmark Tab ══ -->
        <div id="tab-article" style="display:none">

            <div class="field-group">
                <label for="article-url">Article URL:</label>
                <input type="url" class="field-input" id="article-url" placeholder="https://...">
            </div>

            <div class="field-group">
                <label for="article-category">Category:</label>
                <select class="field-input" id="article-category">
                    <option value="General">General</option>
                    <option value="Environmental">Environmental</option>
                    <option value="Culture & History">Culture &amp; History</option>
                    <option value="Economics & Management">Economics &amp; Management</option>
                    <option value="Hobbies">Hobbies</option>
                    <option value="Investment & Financial">Investment &amp; Financial</option>
                    <option value="Law">Law</option>
                    <option value="Politics & Social Sciences">Politics &amp; Social Sciences</option>
                    <option value="Psychology">Psychology</option>
                    <option value="Sciences & Technology">Sciences &amp; Technology</option>
                    <option value="Self Help">Self Help</option>
                    <option value="Philosophy">Philosophy</option>
                </select>
            </div>

            <!-- Screenshot upload -->
            <div class="field-row" id="screenshot-section" style="margin-top: 8px; border-radius: 8px; transition: background 0.4s;">
              <label style="display:block; margin-bottom:6px; color:#333; font-weight:500;">Or upload screenshots:</label>
              <input type="file" id="screenshot-input" accept="image/*" multiple
                     style="display:none" onchange="onScreenshotsSelected(event)">
              <button type="button" class="camera-btn"
                      style="width:auto; padding:10px 18px; font-size:14px;"
                      onclick="document.getElementById('screenshot-input').click()">
                📸 Choose Screenshots
              </button>
              <div id="screenshots-preview" style="display:none; margin-top:10px;">
                <div class="images-grid" id="screenshots-grid"></div>
                <button type="button" class="add-another-btn"
                        style="margin-top:4px;"
                        onclick="document.getElementById('screenshot-input').click()">
                  ➕ Add More Screenshots
                </button>
              </div>
            </div>

            <!-- Analyse Screenshots button (shown only after images selected) -->
            <button class="fetch-btn" id="analyse-btn"
                    style="display:none; background:#34C759; margin-top:8px;"
                    onclick="analyseScreenshot()">
              🤖 Analyse Screenshots
            </button>

            <button class="fetch-btn" id="fetch-btn" onclick="fetchArticle()">
                🔍 Fetch Article
            </button>

            <div class="status" id="article-status"></div>

            <!-- Extracted fields — shown after fetch -->
            <div class="article-fields" id="article-fields">
                <div class="article-fields-title">Review &amp; Edit Before Saving</div>

                <div class="field-group">
                    <label for="article-title">Title:</label>
                    <input type="text" class="field-input" id="article-title">
                </div>

                <div class="field-group">
                    <label for="article-author">Author:</label>
                    <input type="text" class="field-input" id="article-author" placeholder="Leave blank if unknown">
                </div>

                <div class="field-group">
                    <label for="article-date">Release Date:</label>
                    <input type="date" class="field-input" id="article-date">
                </div>

                <div class="field-group">
                    <label for="article-language">Language:</label>
                    <select class="field-input" id="article-language">
                        <option value="English">English</option>
                        <option value="Chinese">Chinese</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="field-group">
                    <label for="article-text-preview">Article Text:</label>
                    <textarea class="field-input" id="article-text-preview" rows="6" placeholder="Paste or type article text here..." oninput="articleBodyText = this.value"></textarea>
                    <div class="text-preview-label" id="article-text-length"></div>
                </div>

                <button class="save-btn" id="article-save-btn" onclick="saveArticleToNotion()">
                    💾 Save to Notion
                </button>
            </div>

            <div class="success-message" id="article-success-message">
                ✅ Successfully saved to Notion!
            </div>

            <div class="error-message" id="article-error-message">
                ❌ <span id="article-error-text"></span>
            </div>

        </div><!-- end #tab-article -->

    </div>

    <script src="/static/app.js"></script>
</body>
</html>
